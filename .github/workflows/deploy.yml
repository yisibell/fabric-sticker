name: Deploy

# Build and publish GitHub Pages when main or release branches receive a push.
on:
  push:
    branches:
      - main
      - release/*

# Official Pages deployment needs write access to Pages and OIDC.
# Repository contents are only read during checkout/build.
permissions:
  contents: read
  pages: write
  id-token: write

# Keep Pages deployments serialized so concurrent pushes do not overwrite each other.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # Official GitHub Pages actions run on GitHub-hosted runners.
    runs-on: ubuntu-latest

    steps:
      # Check out the repository source.
      - name: Checkout code
        uses: actions/checkout@v6

      # Pin pnpm so install policies and behavior do not drift between CI runs.
      - name: Use pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.24.0

      # Use Node 24 and enable pnpm store caching.
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # Install dependencies and build the static site into dist.
      - name: Build Example
        run: |
          pnpm --version
          cat pnpm-workspace.yaml
          pnpm install
          pnpm build-only
        # working-directory: example

      # Prepare this workflow for GitHub Pages deployment.
      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Package dist as the Pages artifact.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      # Deploy the Pages artifact. Repository Pages source must be "GitHub Actions".
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
