name: Deploy

on:
  push:
    branches:
      - main
      - release/*

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Set a Node.js version
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      # pull code
      - name: Checkout code
        uses: actions/checkout@v3

      # using pnpm to install deps
      - name: Use pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      # build to static
      - name: Build Example
        run: |
          pnpm --version
          cat pnpm-workspace.yaml
          pnpm install
          pnpm build-only
        # working-directory: example

      # deploy to `docs` branch
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          clean: true
          branch: gh-pages
          single-commit: true
